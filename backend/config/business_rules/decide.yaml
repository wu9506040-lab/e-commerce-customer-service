# decide 节点业务规则（M14 V3 · 真实工作流重构）
#
# 加载入口：app.services.config_loader.get_config_loader().load("decide")
# 启动期一次加载；改完需重启服务（roadmap §3.5）
#
# 用途：decide 节点三层决策（硬规则前置 → LLM 语义决策 → 校验兜底）的可配置阈值。
#
# 字段分类：
#   1. 置信度阈值：confidence_threshold（< 此值自动 escalate P2）
#   2. 重试上限：max_llm_retries（连续 LLM 异常次数达上限自动 escalate P2）
#   3. 状态中文映射：status_zh_map（P1-3：Resolver 层统一生成，前端直接展示）
#   4. 硬规则配置：hard_rules（4 条 · Resolver action / history_commitment → decide_result）
#   5. 升级默认分类：escalate_categories（4 类别 + 默认 priority）

# === 1. 置信度兜底 ===
# LLM 返回 confidence 低于此阈值 → 自动降级 escalate P2（防 LLM 装懂）
CONFIDENCE_THRESHOLD: 0.7

# === 2. LLM 异常重试上限 ===
# 连续失败次数（decide_retry_count 累计）达到上限 → 自动 escalate P2 "AI 多次异常"
# 注意：仅统计 LLM 异常（format / validate / exception），用户对话轮数走 dialog_turn_count 独立计数
MAX_LLM_RETRIES: 3

# === 3. 状态中文映射（P1-3：Resolver 层生成，前端 / prompt 都用同一份）===
# 与原 refund_graph._STATUS_ZH 对齐（迁移到 YAML 后由 Resolver 注入每条订单）
STATUS_ZH_MAP:
  pending: "待支付"
  paid: "已支付"
  shipped: "运输中"
  delivered: "已签收"
  completed: "已完成"
  refunded: "已退款"

# === 4. 硬规则配置（P0-2 修订：0 单降级为 synthesize，不打爆人工坐席）===
# 命中硬规则 → 跳过 LLM，直接返回 decide_result
# rule_id 形如 "show_picker" / "ask_login_or_list" / "not_found" / "history_commitment"
HARD_RULES:
  # 硬规则 1：Resolver 决策 show_picker（N 单需用户点选）→ 复用决策为 need_confirm_order
  - id: "show_picker"
    decision: "need_confirm_order"
    priority: null
    category: null
    confidence: 1.0
    policy_needed: false
    reply_key_points:
      - "请确认要退款的订单"

  # 硬规则 2：0 单场景 → synthesize 引导用户（不打爆人工坐席）
  - id: "ask_login_or_list"
    decision: "synthesize"
    priority: null
    category: null
    confidence: 1.0
    policy_needed: false
    reply_key_points:
      - "暂无订单，请确认下单账号"
      - "可前往订单页面查看历史订单记录"

  # 硬规则 3：订单不存在 / 越权 → escalate P2 复杂场景
  - id: "not_found"
    decision: "escalate"
    priority: "P2"
    category: "复杂场景"
    confidence: 1.0
    policy_needed: false

  # 硬规则 4：历史承诺匹配（之前 assistant 已说"已为您转接人工"等）→ escalate P1 履约
  - id: "history_commitment"
    decision: "escalate"
    priority: "P1"
    category: "用户要求"
    confidence: 1.0
    policy_needed: false

# === 5. 升级默认分类（P1-1 高风险关键词命中后映射到 priority/category）===
# detect_p0_escalate 命中后写入 HandoffPayload
ESCALATE_CATEGORIES:
  complaint:
    priority: "P0"
    label: "投诉"
  compensation:
    priority: "P0"
    label: "补偿诉求"
  quality:
    priority: "P0"
    label: "质量问题"
  user_requested:
    priority: "P0"
    label: "用户要求"

# === 6. 凭证上传兜底（P1-2：state.image_urls 非空 + LLM 要凭证 → 强制 escalate P1）===
# 真实场景：用户已经上传了图片凭证，但 LLM 仍问"请提供凭证"
IMAGE_URLS_OVERRIDE:
  enabled: true
  priority: "P1"
  category: "质量问题"

# === 7. 政策原文引用强制（T2.2 · 致命问题 4 政策覆盖率提升）===
# 真实场景：用户问"能不能 7 天无理由退款"时，AI 应直接引用政策原文段落（带引号），
# 而不是转述或模糊回答"根据相关规定"。这能：
#   (1) 提高政策覆盖率（合规角度：电商售后必须明示依据）
#   (2) 减少 LLM 自由发挥导致的政策偏离（5 防 → 反幻觉）
# 关闭此开关 → 行为退回 V2（不强制引用）
POLICY_QUOTE_REQUIRED: true

# === 8. 防伪规则（P2-3 · M14-0068 业务层加固）===
# 历史背景：
#   - V2 baseline 实测 1/100 真幻觉（伪单号 ORD20269999XXX）
#   - V3 实测 0/100 真幻觉（refund_query 无 order_no 时改走 invalid_order → synthesize，未触发伪答）
#   - V6 baseline 新增 M14-0070（synthesize 阶段输出 ORD99999999999）— 由 #8 prompt 硬约束消除
#   - V7 baseline 新增 M14-0046（synthesize 阶段输出 fake_status="已签收"）— 由 #9 prompt 硬约束消除
# 治本：本节固化反幻觉规则文档，让"禁止 fabricate"成为业务层一阶规则，而非隐式于 prompt
# 设计原则（CLAUDE.md §9.4.2 配置分离）：
#   - 反幻觉规则在 prompt 体现为 #7/#8/#9 三条硬约束
#   - 关闭 ANTI_FABRICATION_ENABLED → prompt 不注入 #7/#8/#9（退回 V2 行为）
#   - 单独控制字段：FABRICATION_BLOCK_FAKE_AMOUNT / FABRICATION_BLOCK_FAKE_ORDER_NO / FABRICATION_BLOCK_FAKE_STATUS
ANTI_FABRICATION_ENABLED: true

# 反幻觉 #7 开关：禁止 LLM 编造金额（如 "约 50 元"）
FABRICATION_BLOCK_FAKE_AMOUNT: true

# 反幻觉 #8 开关：禁止 LLM 输出【事实陈述】外的订单号（即便用户输入虚假单号）
FABRICATION_BLOCK_FAKE_ORDER_NO: true

# 反幻觉 #9 开关：禁止 LLM 编造订单状态（如【事实陈述】"运输中" 时不得说"已签收"）
FABRICATION_BLOCK_FAKE_STATUS: true

# V10-D 后置校验：synthesize 节点 chat() 调用后，对 final_answer 做正则反幻觉
#   修 M14-0045 fake_amount（替换为真实 total_amount）
#   修 M14-0070 fake_order_no（剥离或替换为真实 order_no）
#   关闭 → 退回 V9 行为（仅 prompt 层防御）
POST_SYNTHESIZE_HALLUCINATION_CHECK: true

# === 9. fake_status 业务层硬替换开关（V11-B · M14-0042/0046/0049 真实话术根因）===
# 历史背景：
#   - V10-D 后置校验对 fake_status 设计为"仅 warning 不替换"，理由是状态术语歧义大、误伤风险高
#   - V10-E baseline 残留 0~1/100 fake_status 失败（M14-0042/0046/0049 物流类"已签收"礼貌收尾）
#   - 用户 memory "LLM 反幻觉必须 prompt + 业务层双重防护"：fake_amount/order_no 已有双层，fake_status 缺业务层
# V11-B 治本：在 hallucination_guard.py post_synthesize_check 加 fake_status 业务层硬替换分支
#   - 状态词正则匹配 STATUS_ZH_MAP 6 个合法中文状态(待支付/已支付/运输中/已签收/已完成/已退款)
#   - 文本中状态词 != order_info["status_zh"] → 替换为「您的订单当前状态是:{real}」
#   - 真实状态缺失时降级为剥离（兜底,与 fake_order_no 行为一致）
# 关闭此开关 → 退回 V10-D "仅 warning" 行为（仅 logger.warning,不改文本）
HALLUCINATION_REPLACE_FAKE_STATUS: true

# === 10. 多意图识别灰度开关（V12 · 阶段 1 多意图识别 / 阶段 2 V13 完整意图扩写）===
# 历史背景：
#   - V3-M11 阶段一直为单意图分类（IntentType Literal，classify() 返 {"intent": str, ...}）
#   - 真实 query 约 20-30% 含多意图（"订单怎么退款，运费谁出"=refund+policy；"这台电脑续航怎么样，能分期吗"=product+policy）
#   - 单意图强行分派要么答不全、要么 LLM 串答
# V12 阶段 1 治本：classify() 改返新结构 {"intents": [...], "primary": str, "method": str, "entities": {...}}
#   - 规则层天然单意图（intents=[1 个]）；LLM 兜底层可识别多意图（top-K=2）
#   - 保留 "intent"/"confidence" 别名（= primary）→ 12 个测试 fixture + 6 个消费方零修改
#   - secondary intents 由 orchestrator 拼到 prompt context（V12-C 实施）
# V13 阶段 2 计划：扩 chitchat / complaint / 等 + K=全（不动 V12 基础设施）
# 关闭此开关 → 退回 V11 单意图行为（intents 长度仍为 1，行为完全一致）
ENABLE_MULTI_INTENT: true