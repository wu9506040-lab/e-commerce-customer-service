# refund_graph / refund_tool / order_lifecycle 业务规则（Sprint 4 阶段 3）
#
# 加载入口：app.services.config_loader.get_config_loader().load("refund")
# 启动期一次加载；改完需重启服务（roadmap §3.5）
#
# ⚠️ 单一真相源：3 个文件共享同一份 YAML（迁移前是 3 处硬编码同一数值）
#   - app/services/refund_graph.py
#   - app/tools/refund_tool.py
#   - app/services/order_lifecycle.py

# 7 天无理由退货窗口（与京东/淘宝标准对齐）
REFUND_WINDOW_DAYS: 7

# 签收日偏移（Order 模型暂无 delivery_time 字段；create_time + N 天作为签收日推算）
# 与 OrderTool.get_logistics 的 hard-coded +2 days 保持一致
DELIVERY_OFFSET_DAYS: 2