# Sprint 5 阶段 1: agent prompt manifest 示范
#
# 演示 PromptLoader 多版本机制（manifest 模式）：
# - default_version: 当前激活的版本号
# - versions: 版本字典，每个版本指向一个内容文件
#   - file: 相对 prompts/ 目录的 YAML 文件路径
#   - stable: 是否为稳定版（标识用，不影响加载逻辑）
#   - note: 版本说明（人类可读）
#
# 灰度（traffic_ratio / hash）作为 Sprint 5 后续阶段，本文件暂不演示。
#
# 其他 5 个 YAML（no_login / query_rewriter/*）暂保持旧 {content: ...} 格式，
# loader 自动按兼容模式处理；这些 YAML 在 Sprint 5 后续阶段按需迁移。

default_version: v1
versions:
  v1:
    file: agent_v1.yaml
    stable: true
    note: |
      Sprint 3 迁移原 synthesizer.py:48-63 SYSTEM_PROMPT_BASE 严格"仅迁移位置不改字"。
      行为与 Sprint 3 时期完全一致；切换到该版本 = 回滚到 Sprint 3 行为。
  v2:
    file: agent_v2.yaml
    stable: false
    note: |
      实验版（仅作机制示范）：调整引用标签示例 + 增加礼貌前缀。
      实际启用需配合业务灰度策略（Sprint 5 后续阶段）。