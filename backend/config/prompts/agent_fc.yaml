# Sprint 19: agent_fc prompt manifest（多版本机制）
#
# Sprint 5 阶段 1 落地 PromptLoader manifest 模式：
# - default_version: 当前激活的版本号（v2 = S19 13 工具）
# - versions: 版本字典，每个版本指向一个内容文件
#   - file: 相对 prompts/ 目录的 YAML 文件路径
#   - stable: 是否为稳定版
#   - note: 版本说明
#
# 版本变更：
# - v1: Sprint 2 迁移期（3 工具：lookup_order / search_product / search_policy）
# - v2: Sprint 19（13 工具：原 4 个 + 9 Service Tool；含写操作 2 步确认机制）
#
# 灰度策略：本 manifest 仅做版本管理；启用走 settings.ENABLE_AGENT_FC 灰度开关（V2 默认 False）。

default_version: v2
versions:
  v1:
    file: agent_fc_v1.yaml
    stable: true
    note: |
      Sprint 2 迁移期。3 工具（lookup_order / search_product / search_policy）。
      切到该版本 = 回滚到 Sprint 2 行为。
  v2:
    file: agent_fc_v2.yaml
    stable: true
    note: |
      Sprint 19：13 工具（4 已有 + 9 Service Tool）。
      新增：get_refund_reason_advice / get_shipping_insurance_info /
      get_refund_type_advice / get_active_promotions / check_coupon_stackable /
      calculate_bundle_discount / modify_address / modify_item_spec / merge_orders。
      写操作 2 步确认机制：modify_address / modify_item_spec / merge_orders
      必须 confirmed=true 才执行；否则返 {"status": "needs_confirmation"} 让 AI 询问用户。