# =============================================================
# Vue3 前端 - nginx 生产配置（企业级 /api/ 分层）
# 配套 deploy/docker-compose.yml 的 frontend 服务
#
# 关键设计：
#   1. /              → SPA 静态资源 + @spa fallback（Vue Router 接管）
#   2. /api/          → 反代 FastAPI 后端（API 路径空间隔离）
#   3. /api/chat      → SSE 流式（禁 buffer + HTTP/1.1 + 长 timeout）
#   4. /api/ 其他路径 → JSON 通用反代（buffer 开，吞吐优先）
# =============================================================

server {
    listen 80;
    server_name localhost;
    charset utf-8;
    client_max_body_size 20M;  # 知识库文件上传

    # Vue3 SPA 静态资源 + fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ @spa;  # 找不到文件 → SPA fallback
    }

    # 静态资源 cache（Vite 产物带 hash）
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback：所有未知路径 → index.html，让 Vue Router 处理
    location @spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ---------- /api/ 反代（通用 JSON）----------
    # 大部分 /api/* 是 JSON 请求，buffer 开提高吞吐
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $http_host;  # 用 $http_host 保留端口
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;  # 防止旧 301 浏览器缓存
    }

    # ---------- /api/chat 反代（SSE 流式，必须禁 buffer）----------
    location = /api/chat {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;          # SSE 需要 keep-alive
        proxy_set_header Connection "";
        proxy_buffering off;            # SSE 必须实时推送
        proxy_cache off;
        proxy_read_timeout 300s;        # 流式回答可能持续 1-2 分钟
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    # 健康检查（nginx 层）
    location /healthz {
        access_log off;
        return 200 "ok\n";
    }
}