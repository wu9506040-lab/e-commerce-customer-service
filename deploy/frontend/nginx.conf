# =============================================================
# Vue3 前端 - nginx 生产配置
# 配套 deploy/docker-compose.yml 的 frontend 服务
#
# 关键设计：
#   1. 根路径 /          → SPA 静态文件
#   2. /chat             → 反代 API，禁用 buffer（SSE 流式必须）
#   3. /auth /conversations /admin /docs /openapi.json → 反代 API
#   4. proxy_http_version 1.1（keep-alive，SSE 需要）
# =============================================================

server {
    listen 80;
    server_name localhost;
    charset utf-8;
    client_max_body_size 20M;  # 知识库文件上传

    # Vue3 SPA 静态资源
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    # 静态资源 cache（Vite 产物带 hash）
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---------- API 反代 ----------
    # 通用设置：透传 Host / IP / HTTPS 标记
    # 注意：location 不带尾斜杠（避免 nginx 自动 301 重定向到带尾斜杠版本）
    location /auth {
        proxy_pass http://api:8000;
        proxy_set_header Host $http_host;  # 用 $http_host 保留端口
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;  # 防止旧 301 被浏览器缓存
    }

    location /conversations {
        proxy_pass http://api:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store" always;
    }

    location /admin {
        proxy_pass http://api:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-store" always;
    }

    # SSE 流式：必须禁 buffer + HTTP/1.1
    location /chat {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;  # 流式回答可能持续 1-2 分钟
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-store" always;
    }

    # Swagger / OpenAPI（便利调试）
    location /docs {
        proxy_pass http://api:8000;
        proxy_set_header Host $http_host;
        add_header Cache-Control "no-store" always;
    }
    location /openapi.json {
        proxy_pass http://api:8000;
        add_header Cache-Control "no-store" always;
    }

    # 健康检查
    location /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
