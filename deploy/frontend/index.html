<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能客服 Agent 系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 48px 64px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      text-align: center;
    }
    h1 { font-size: 32px; margin-bottom: 16px; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      font-size: 12px;
      margin-bottom: 24px;
    }
    p { font-size: 16px; line-height: 1.6; margin-bottom: 24px; opacity: 0.9; }
    .links { display: flex; gap: 16px; justify-content: center; }
    a {
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      transition: background 0.2s;
    }
    a:hover { background: rgba(255, 255, 255, 0.3); }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🚧 占位页面</div>
    <h1>智能客服 Agent 系统</h1>
    <p>前端 Vue3 代码待开发。<br>当前使用 nginx 占位服务，验证基础设施链路。</p>
    <div class="links">
      <a href="http://localhost:8000/docs" target="_blank">API 文档</a>
      <a href="http://localhost:6333/dashboard" target="_blank">Qdrant</a>
    </div>
  </div>
</body>
</html>
