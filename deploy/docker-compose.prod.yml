# =============================================================
# 智能客服 - 生产环境 override
# 用法：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  --env-file .env.prod up -d
#
# 设计原则：
#   - 不复制 services 块（用 -f 合并，配置源唯一）
#   - 只覆盖与 dev 不同的字段
#   - 与 dev compose 共享网络 / 卷 / 依赖关系
# =============================================================

services:
  # ---------------------------------------------------------
  # API：prod 强化（HTTPS Cookie / 资源放宽 / 总是重启）
  # ---------------------------------------------------------
  api:
    environment:
      APP_ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      # 生产必须 HTTPS，Cookie 走 secure 标志
      COOKIE_SECURE: "true"
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G    # 生产放宽（dev 限 1G）

  # ---------------------------------------------------------
  # Frontend：prod 启用（dev 中被注释的 nginx 容器）
  # 通过 -f 合并时，frontend 服务在此显式覆盖声明
  # ---------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: customer-service-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

# ---------------------------------------------------------
# 覆盖 networks 名称（避免与 dev 环境冲突）
# 实际网络仍由 docker-compose.yml 声明；此处只改 name
# ---------------------------------------------------------
networks:
  backend:
    name: customer-service-backend-prod
