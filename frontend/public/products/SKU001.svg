<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- 背景：浅蓝灰渐变（手机类目色） -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#dde6ef"/>
    </linearGradient>
    <linearGradient id="phone1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="screen1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="50%" stop-color="#357abd"/>
      <stop offset="100%" stop-color="#2c5d8f"/>
    </linearGradient>
    <filter id="shadow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#bg1)"/>

  <!-- 手机阴影 -->
  <ellipse cx="300" cy="500" rx="120" ry="14" fill="#000" opacity="0.12"/>

  <!-- 手机主体 -->
  <g filter="url(#shadow1)">
    <!-- 外壳 -->
    <rect x="195" y="100" width="210" height="380" rx="22" ry="22" fill="url(#phone1)" stroke="#0d1418" stroke-width="1"/>
    <!-- 屏幕 -->
    <rect x="207" y="118" width="186" height="344" rx="14" ry="14" fill="url(#screen1)"/>
    <!-- 刘海 -->
    <rect x="270" y="118" width="60" height="14" rx="7" ry="7" fill="#0d1418"/>
    <!-- 摄像头小点 -->
    <circle cx="345" cy="125" r="3" fill="#1a252f" stroke="#4a90e2" stroke-width="0.5"/>
    <!-- 屏幕内容：抽象图标（信号 + 时钟） -->
    <text x="300" y="170" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="20" font-weight="300" opacity="0.9">09:41</text>
    <!-- 信号条 -->
    <rect x="225" y="220" width="20" height="3" fill="#fff" opacity="0.8"/>
    <rect x="248" y="220" width="20" height="3" fill="#fff" opacity="0.5"/>
    <rect x="271" y="220" width="20" height="3" fill="#fff" opacity="0.3"/>
    <!-- 三个圆形 app 占位 -->
    <circle cx="240" cy="280" r="22" fill="#fff" opacity="0.15"/>
    <circle cx="300" cy="280" r="22" fill="#fff" opacity="0.15"/>
    <circle cx="360" cy="280" r="22" fill="#fff" opacity="0.15"/>
    <circle cx="240" cy="340" r="22" fill="#fff" opacity="0.1"/>
    <circle cx="300" cy="340" r="22" fill="#fff" opacity="0.1"/>
    <circle cx="360" cy="340" r="22" fill="#fff" opacity="0.1"/>
    <!-- Home indicator -->
    <rect x="270" y="440" width="60" height="3" rx="1.5" fill="#fff" opacity="0.5"/>
  </g>

  <!-- 侧边按钮 -->
  <rect x="192" y="180" width="3" height="40" fill="#0d1418"/>
  <rect x="192" y="240" width="3" height="60" fill="#0d1418"/>
  <rect x="405" y="200" width="3" height="80" fill="#0d1418"/>

  <!-- 底部产品名 + SKU -->
  <text x="300" y="540" text-anchor="middle" fill="#1a252f" font-family="system-ui" font-size="18" font-weight="600">智选科技 ZP1 旗舰手机</text>
  <text x="300" y="565" text-anchor="middle" fill="#666" font-family="system-ui" font-size="13">SKU001 · 12+256</text>
</svg>