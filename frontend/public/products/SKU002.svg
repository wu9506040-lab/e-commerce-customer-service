<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf2f0"/>
      <stop offset="100%" stop-color="#f5d6cf"/>
    </linearGradient>
    <linearGradient id="phone2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="lens2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="60%" stop-color="#0d1418"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="shadow2"><feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="600" fill="url(#bg2)"/>
  <ellipse cx="300" cy="500" rx="120" ry="14" fill="#000" opacity="0.12"/>

  <g filter="url(#shadow2)">
    <!-- 手机外壳 - 微曲 -->
    <rect x="195" y="100" width="210" height="380" rx="26" ry="26" fill="url(#phone2)" stroke="#000" stroke-width="1"/>
    <!-- 屏幕 -->
    <rect x="207" y="118" width="186" height="344" rx="18" ry="18" fill="#0a0a0a"/>
    <!-- 屏幕内容 - 相机取景 -->
    <rect x="207" y="118" width="186" height="344" rx="18" ry="18" fill="#1a1a1a"/>
    <circle cx="300" cy="290" r="80" fill="none" stroke="#fff" stroke-width="1" opacity="0.15"/>
    <circle cx="300" cy="290" r="60" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
    <!-- 拍照按钮 -->
    <circle cx="300" cy="430" r="22" fill="#fff" opacity="0.95"/>
    <circle cx="300" cy="430" r="16" fill="#e1251b"/>
  </g>

  <!-- 大摄像头模组（背面的标志性元素，但要放在屏幕上方表示这是拍照旗舰）-->
  <g>
    <rect x="220" y="135" width="170" height="60" rx="12" ry="12" fill="#1a1a1a" opacity="0.85"/>
    <circle cx="250" cy="165" r="18" fill="url(#lens2)" stroke="#333" stroke-width="1"/>
    <circle cx="250" cy="165" r="10" fill="#000"/>
    <circle cx="248" cy="163" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="305" cy="165" r="18" fill="url(#lens2)" stroke="#333" stroke-width="1"/>
    <circle cx="305" cy="165" r="10" fill="#000"/>
    <circle cx="303" cy="163" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="360" cy="165" r="14" fill="url(#lens2)" stroke="#333" stroke-width="1"/>
    <circle cx="360" cy="165" r="7" fill="#000"/>
    <text x="380" y="172" fill="#fff" font-family="system-ui" font-size="9" opacity="0.7">PRO</text>
  </g>

  <text x="300" y="540" text-anchor="middle" fill="#1a1a1a" font-family="system-ui" font-size="18" font-weight="600">智选科技 ZP2 Pro 拍照手机</text>
  <text x="300" y="565" text-anchor="middle" fill="#666" font-family="system-ui" font-size="13">SKU002 · 8+256 · 旗舰影像</text>
</svg>