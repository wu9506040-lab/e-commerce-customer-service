    <rect x="100" y="160" width="400" height="280" rx="20" ry="20" fill="url(#tab7)" stroke="#000" stroke-width="1"/>
    <!-- 屏幕 -->
    <rect x="115" y="175" width="370" height="250" rx="10" ry="10" fill="url(#screen7)"/>

    <!-- 屏幕内容 - 阅读视图 -->
