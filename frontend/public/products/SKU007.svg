<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0f8"/>
      <stop offset="100%" stop-color="#c9ddee"/>
    </linearGradient>
    <linearGradient id="tab7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="screen7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f0ff"/>
      <stop offset="100%" stop-color="#b0d4f0"/>
    </linearGradient>
    <filter id="shadow7"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dy="8"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="600" fill="url(#bg7)"/>
  <ellipse cx="300" cy="490" rx="200" ry="14" fill="#000" opacity="0.15"/>

  <g filter="url(#shadow7)">
