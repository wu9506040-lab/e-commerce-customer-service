  <text x="300" y="540" text-anchor="middle" fill="#1a1a1a" font-family="system-ui" font-size="18" font-weight="600">智选科技 PT1 平板</text>
  <text x="300" y="565" text-anchor="middle" fill="#666" font-family="system-ui" font-size="13">SKU007 · 8+256 · 学习办公</text>
