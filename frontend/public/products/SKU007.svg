    <rect x="115" y="175" width="370" height="22" fill="#fff" opacity="0.95"/>
    <text x="135" y="190" fill="#1a1a1a" font-family="system-ui" font-size="10" font-weight="600">9:41</text>
    <rect x="455" y="184" width="14" height="8" rx="1" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="457" y="186" width="8" height="4" fill="#19be6b"/>

    <!-- 大标题 -->
    <text x="300" y="240" text-anchor="middle" fill="#1a1a1a" font-family="system-ui" font-size="20" font-weight="700">新闻早班车</text>
    <text x="300" y="258" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">2026年6月28日</text>

    <!-- 内容区块 -->
    <rect x="135" y="280" width="160" height="60" rx="4" fill="#fff" opacity="0.6"/>
    <rect x="143" y="290" width="80" height="6" rx="2" fill="#333"/>
    <rect x="143" y="304" width="120" height="4" rx="2" fill="#999"/>
    <rect x="143" y="314" width="100" height="4" rx="2" fill="#999"/>
    <rect x="143" y="324" width="110" height="4" rx="2" fill="#999"/>

    <rect x="305" y="280" width="160" height="60" rx="4" fill="#fff" opacity="0.6"/>
    <rect x="313" y="290" width="80" height="6" rx="2" fill="#333"/>
    <rect x="313" y="304" width="120" height="4" rx="2" fill="#999"/>
    <rect x="313" y="314" width="100" height="4" rx="2" fill="#999"/>
    <rect x="313" y="324" width="110" height="4" rx="2" fill="#999"/>

    <!-- 大图占位 -->
    <rect x="135" y="350" width="330" height="60" rx="4" fill="#e1251b" opacity="0.7"/>
    <text x="300" y="385" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">618 大促 · 全场满 300 减 50</text>
