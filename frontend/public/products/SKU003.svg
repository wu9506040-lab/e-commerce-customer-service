    <rect x="210" y="130" width="180" height="335" rx="14" ry="14" fill="url(#screen3)"/>
    <!-- 水滴屏 -->
    <path d="M285 130 Q300 145 315 130" fill="#1a1a1a"/>
    <!-- 价格标签式屏幕内容 -->
    <text x="300" y="180" text-anchor="middle" fill="#e1251b" font-family="system-ui" font-size="32" font-weight="700">¥999</text>
