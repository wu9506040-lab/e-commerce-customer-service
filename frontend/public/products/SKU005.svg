<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f5"/>
      <stop offset="100%" stop-color="#d9d9e6"/>
    </linearGradient>
    <linearGradient id="cup5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cushion5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <filter id="shadow5"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dy="8"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="600" fill="url(#bg5)"/>
  <ellipse cx="300" cy="470" rx="160" ry="14" fill="#000" opacity="0.15"/>

  <g filter="url(#shadow5)">
    <!-- 头梁（顶部弧形） -->
    <path d="M165 230 Q165 130 300 130 Q435 130 435 230" stroke="url(#cup5)" stroke-width="22" fill="none" stroke-linecap="round"/>

    <!-- 左耳罩 -->
    <ellipse cx="165" cy="280" rx="58" ry="80" fill="url(#cup5)"/>
    <ellipse cx="165" cy="280" rx="40" ry="60" fill="url(#cushion5)"/>
    <!-- 左耳罩内圈装饰（喇叭孔） -->
    <circle cx="165" cy="280" r="20" fill="none" stroke="#444" stroke-width="0.5" opacity="0.6"/>
    <circle cx="165" cy="280" r="14" fill="none" stroke="#444" stroke-width="0.5" opacity="0.6"/>
    <circle cx="165" cy="280" r="8" fill="none" stroke="#444" stroke-width="0.5" opacity="0.6"/>

    <!-- 右耳罩 -->
    <ellipse cx="435" cy="280" rx="58" ry="80" fill="url(#cup5)"/>
    <ellipse cx="435" cy="280" rx="40" ry="60" fill="url(#cushion5)"/>
    <circle cx="435" cy="280" r="20" fill="none" stroke="#444" stroke-width="0.5" opacity="0.6"/>
    <circle cx="435" cy="280" r="14" fill="none" stroke="#444" stroke-width="0.5" opacity="0.6"/>
    <circle cx="435" cy="280" r="8" fill="none" stroke="#444" stroke-width="0.5" opacity="0.6"/>

    <!-- 品牌标 -->
    <rect x="155" y="262" width="20" height="6" rx="1" fill="#e1251b"/>
    <rect x="425" y="262" width="20" height="6" rx="1" fill="#e1251b"/>

    <!-- 麦克风臂（降噪标志） -->
    <line x1="220" y1="200" x2="180" y2="170" stroke="#2c2c2c" stroke-width="4" stroke-linecap="round"/>
    <circle cx="178" cy="168" r="5" fill="#0a0a0a" stroke="#444" stroke-width="0.5"/>
  </g>

  <text x="300" y="540" text-anchor="middle" fill="#0a0a0a" font-family="system-ui" font-size="18" font-weight="600">智选科技 BP1 无线降噪耳机</text>
  <text x="300" y="565" text-anchor="middle" fill="#666" font-family="system-ui" font-size="13">SKU005 · ANC 主动降噪</text>
</svg>